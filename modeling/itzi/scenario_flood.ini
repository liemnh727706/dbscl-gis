# Cau hinh Itzi mau - mo phong ngap do mua lon tren DEM DBSCL
# Tai lieu: https://itzi.readthedocs.io/
[time]
duration = 0:24:00:00
record_step = 0:01:00:00

[input]
dem = dem
friction = n_land          ; r.mapcalc "n_land = 0.06"
rain = rain_100mm          ; thay bang chuoi thoi gian mua that (strds)

[output]
prefix = flood_out
values = water_depth, v

[statistics]
stats_file = flood_out_stats.csv

[options]
theta = 0.9
cfl = 0.7
dtmax = 5
