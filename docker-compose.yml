version: "3.8"

services:
  # Node.js API backend - realtime data + orchestration + alerts
  server:
    build: ./server
    environment:
      - PORT=3000
      - MODEL_API_URL=http://modeling:8000
      - CACHE_TTL_SECONDS=600
    depends_on:
      - modeling
    restart: unless-stopped

  # Python modeling service - HAND-FIM flood + salinity intrusion
  modeling:
    build: ./modeling
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  # Frontend - MapLibre GL JS, served by nginx which also proxies /api
  # (raster ngap/man do modeling render PNG truc tiep - khong can TiTiler)
  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
