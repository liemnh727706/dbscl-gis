server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API backend Node.js (gom ca /api/render.png - anh phu ket qua)
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;   # mo phong co the chay vai phut
    }
}
